<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Comply.now · Pianat Admin</title>
    <link rel="icon" type="image/svg+xml" href="/assets/images/Shield Icon green.svg" />
    <!-- Apply the theme before first paint to avoid a flash. Dark is the
         default; only an explicit 'light' preference opts out. -->
    <script>
      try {
        if (localStorage.getItem('pa_theme') !== 'light') document.documentElement.classList.add('dark');
      } catch (e) {
        document.documentElement.classList.add('dark');
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
